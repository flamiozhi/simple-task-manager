<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens ── */
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #7c6af7;
      --accent-h:  #9b8dfb;
      --danger:    #e05a6b;
      --danger-h:  #f07080;
      --success:   #4cbb8e;
      --text:      #e8eaf0;
      --muted:     #6b6f85;
      --done-bg:   #151720;
      --radius:    10px;
      --transition: 0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    header h1 span {
      color: var(--accent);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      overflow: hidden;
    }

    /* ── Input section ── */
    .input-section {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    #task-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color var(--transition);
    }
    #task-input::placeholder { color: var(--muted); }
    #task-input:focus { border-color: var(--accent); }

    #add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      white-space: nowrap;
    }
    #add-btn:hover { background: var(--accent-h); transform: translateY(-1px); }
    #add-btn:active { transform: translateY(0); }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
    }
    .stats-bar .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .stats-bar .counts {
      display: flex;
      gap: 16px;
    }
    .stat-chip {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .stat-chip.total  { background: #252840; color: var(--accent); }
    .stat-chip.done   { background: #1a2e27; color: var(--success); }
    .stat-chip.active { background: #1e1c2e; color: #a898ff; }

    /* ── Task list ── */
    #task-list {
      list-style: none;
      min-height: 80px;
      max-height: 440px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #task-list::-webkit-scrollbar { width: 4px; }
    #task-list::-webkit-scrollbar-track { background: transparent; }
    #task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2rem; opacity: 0.5; }
    .empty-state p { font-size: 13px; }

    /* ── Task item ── */
    li.task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background var(--transition), opacity var(--transition);
      animation: slideIn 0.2s ease;
    }
    li.task-item:last-child { border-bottom: none; }
    li.task-item:hover { background: rgba(124,106,247,0.04); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox */
    .check-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition), background var(--transition);
    }
    .check-btn:hover { border-color: var(--success); }
    .check-btn .tick { display: none; color: #fff; font-size: 12px; }

    /* Task name */
    .task-name {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* Delete */
    .delete-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      font-size: 14px;
      padding: 4px 8px;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      opacity: 0;
    }
    li.task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover {
      color: var(--danger-h);
      border-color: var(--danger);
      background: rgba(224,90,107,0.1);
    }

    /* ── Completed state ── */
    li.task-item.completed {
      background: var(--done-bg);
      opacity: 0.75;
    }
    li.task-item.completed .check-btn {
      background: var(--success);
      border-color: var(--success);
    }
    li.task-item.completed .check-btn .tick { display: block; }
    li.task-item.completed .task-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* ── Footer ── */
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }
    #clear-done-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    #clear-done-btn:hover {
      color: var(--danger-h);
      border-color: var(--danger);
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Stay on track</p>
    <h1>Task <span>Manager</span></h1>
  </header>

  <div class="card">

    <!-- Input -->
    <div class="input-section">
      <input
        type="text"
        id="task-input"
        placeholder="Add a new task…"
        maxlength="120"
        autocomplete="off"
      />
      <button id="add-btn">+ Add Task</button>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <span class="label">Tasks</span>
      <div class="counts">
        <span class="stat-chip total"  id="count-total">0 total</span>
        <span class="stat-chip active" id="count-active">0 active</span>
        <span class="stat-chip done"   id="count-done">0 done</span>
      </div>
    </div>

    <!-- List -->
    <ul id="task-list">
      <li class="empty-state" id="empty-state">
        <span class="icon">📋</span>
        <p>No tasks yet — add one above to get started.</p>
      </li>
    </ul>

    <!-- Footer -->
    <div class="card-footer">
      <button id="clear-done-btn">Clear completed</button>
    </div>

  </div>

  <script>
    const input        = document.getElementById('task-input');
    const addBtn       = document.getElementById('add-btn');
    const taskList     = document.getElementById('task-list');
    const emptyState   = document.getElementById('empty-state');
    const clearDoneBtn = document.getElementById('clear-done-btn');
    const countTotal   = document.getElementById('count-total');
    const countActive  = document.getElementById('count-active');
    const countDone    = document.getElementById('count-done');

    let tasks = []; // { id, name, completed }
    let nextId = 1;

    /* ── Render ── */
    function render() {
      // Remove all task <li> elements (keep empty-state)
      Array.from(taskList.querySelectorAll('li.task-item')).forEach(el => el.remove());

      if (tasks.length === 0) {
        emptyState.style.display = 'flex';
      } else {
        emptyState.style.display = 'none';
        tasks.forEach(task => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.completed ? ' completed' : '');
          li.dataset.id = task.id;

          // Check button
          const checkBtn = document.createElement('button');
          checkBtn.className = 'check-btn';
          checkBtn.setAttribute('aria-label', task.completed ? 'Mark incomplete' : 'Mark complete');
          const tick = document.createElement('span');
          tick.className = 'tick';
          tick.textContent = '✓';
          checkBtn.appendChild(tick);

          // Task name
          const nameEl = document.createElement('span');
          nameEl.className = 'task-name';
          nameEl.textContent = task.name;

          // Delete button
          const delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.setAttribute('aria-label', 'Delete task');
          delBtn.textContent = '✕';

          li.appendChild(checkBtn);
          li.appendChild(nameEl);
          li.appendChild(delBtn);
          taskList.appendChild(li);

          // Events
          checkBtn.addEventListener('click', () => toggleTask(task.id));
          delBtn.addEventListener('click', () => deleteTask(task.id));
        });
      }

      updateStats();
    }

    function updateStats() {
      const total  = tasks.length;
      const done   = tasks.filter(t => t.completed).length;
      const active = total - done;
      countTotal.textContent  = `${total} total`;
      countActive.textContent = `${active} active`;
      countDone.textContent   = `${done} done`;
    }

    /* ── Actions ── */
    function addTask() {
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      tasks.push({ id: nextId++, name, completed: false });
      input.value = '';
      input.focus();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) task.completed = !task.completed;
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      render();
    }

    /* ── Event Listeners ── */
    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
    clearDoneBtn.addEventListener('click', clearCompleted);

    /* ── Initial render ── */
    render();
  </script>
</body>
</html>
